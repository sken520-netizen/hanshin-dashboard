<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanshin AI-Ops Dashboard v6</title>
    
    <!-- 1. Technical Fix (Critical): 腳本全部移至 head 最上方 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.js"></script>
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc; /* 淺灰色背景，符合 v6 截圖 */
            color: #1e293b;
            margin: 0;
            overflow-x: hidden;
        }

        /* Loading 動畫 */
        .spinner {
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 隱藏原生卷軸，使用定製化卷軸 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* 漸入動畫 */
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Recharts 文字強制深色覆蓋 */
        .recharts-cartesian-axis-tick-value,
        .recharts-legend-item-text,
        .recharts-label {
            fill: #475569 !important;
            color: #475569 !important;
            font-weight: 500 !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 千分位格式化
        const formatNum = (v) => {
            if (typeof v === 'string') return v;
            return new Intl.NumberFormat('zh-TW').format(v);
        };

        // 財務標準檢查：嚴格 ±5% 變動顏色邏輯
        const getGrowthColor = (change, isExpense) => {
            if (change >= -5 && change <= 5) return 'text-gray-500'; // ±5% 內一律灰色
            
            const isPositive = change > 0;
            if (isExpense) {
                // 費用：減少 (>5%) 是好事 (綠色)，增加 (>5%) 是壞事 (紅色)
                return !isPositive ? 'text-emerald-500' : 'text-rose-500'; 
            }
            // 收入/淨利：增加 (>5%) 是好事 (綠色)，減少 (>5%) 是壞事 (紅色)
            return isPositive ? 'text-emerald-500' : 'text-rose-500'; 
        };

        // 動態文字染色引擎：規則自動判斷顏色
        // type: 'expense' | 'revenue' | 'profit'
        // value: 實際變動金額（正數=增加，負數=減少）
        const formatAnalysisText = (type, value, text) => {
            const isPositive = value > 0;
            let colorClass;
            if (type === 'expense') {
                // 費用：增加為紅，減少為綠
                colorClass = isPositive ? 'font-bold text-rose-600' : 'font-bold text-emerald-600';
            } else {
                // 收入/淨利：增加為綠，減少為紅
                colorClass = isPositive ? 'font-bold text-emerald-600' : 'font-bold text-rose-600';
            }
            return <span className={colorClass}>{text}</span>;
        };

        // 組件：五環 KPIs (圓環設計)
        const KPIRing = ({ title, value, rate, change, isExpense, tooltip }) => {
            const growthColor = getGrowthColor(change, isExpense);
            const valueStr = typeof value === 'number' ? formatNum(value) : value;
            const changeSign = change > 0 ? '+' : '';

            return (
                <div className="flex justify-center flex-shrink-0 relative group">
                    <div className="w-52 h-52 rounded-full border-[6px] border-[#e8f5e9] bg-white flex flex-col items-center justify-center shadow-lg shadow-emerald-900/5 relative overflow-hidden transition-transform duration-300 hover:scale-105">
                        <div className="absolute inset-0 rounded-full border border-emerald-500/10 m-[2px]"></div>
                        <h4 className="text-sm font-semibold text-gray-600 mb-1">{title}</h4>
                        <p className="text-2xl font-black text-gray-900 mb-0.5 tracking-tight">{valueStr}</p>
                        <span className="text-[10px] text-gray-400 font-medium mb-3">百萬元</span>
                        
                        {rate !== undefined && change !== undefined && (
                            <div className="flex items-center gap-3 text-[11px] font-bold w-full mx-auto justify-center">
                                <div className="flex flex-col items-center">
                                    <span className="text-[9px] text-gray-400 font-medium leading-none">達成</span>
                                    {/* 費用達成率 < 95% 為綠色，其他預設灰色/深色 */}
                                    <span className={`mt-1 ${(isExpense && title.includes('營業費用') && rate < 95) ? 'text-emerald-500' : 'text-gray-700'}`}>{rate.toFixed(1)}%</span>
                                </div>
                                <div className="w-[1px] h-6 bg-gray-200"></div>
                                <div className="flex flex-col items-center">
                                    <span className="text-[9px] text-gray-400 font-medium leading-none">成長</span>
                                    <span className={`mt-1 ${growthColor}`}>{changeSign}{change.toFixed(1)}%</span>
                                </div>
                            </div>
                        )}
                    </div>
                    {/* Tooltip */}
                    {tooltip && (
                        <div className="absolute top-[-10px] left-1/2 transform -translate-x-1/2 -translate-y-full opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none z-50 w-52 p-3 bg-slate-800 text-white text-xs rounded-lg shadow-xl shadow-slate-900/20 border border-slate-700/50">
                            {tooltip.split('\n').map((line, i) => (
                                <div key={i} className={i > 0 ? 'mt-1 pt-1 border-t border-slate-700/50' : ''}>{line}</div>
                            ))}
                            <div className="absolute bottom-[-5px] left-1/2 transform -translate-x-1/2 w-2 h-2 bg-slate-800 rotate-45 border-r border-b border-slate-700/50"></div>
                        </div>
                    )}
                </div>
            );
        };

        const EPSRing = ({ title, value, tooltip }) => (
            <div className="flex justify-center flex-shrink-0 relative group">
                <div className="w-52 h-52 rounded-full border-[6px] border-[#e8f5e9] bg-white flex flex-col items-center justify-center shadow-lg shadow-emerald-900/5 relative transition-transform duration-300 hover:scale-105">
                    <div className="absolute inset-0 rounded-full border border-emerald-500/10 m-[2px]"></div>
                    <h4 className="text-sm font-semibold text-gray-600 mb-2">{title}</h4>
                    <p className="text-4xl font-black text-gray-900 mb-1 tracking-tight">{value}</p>
                    <span className="text-xs text-gray-400 font-medium">元</span>
                </div>
                {/* Tooltip */}
                {tooltip && (
                    <div className="absolute top-[-10px] left-1/2 transform -translate-x-1/2 -translate-y-full opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none z-50 w-64 p-3 bg-slate-800 text-white text-xs rounded-lg shadow-xl shadow-slate-900/20 border border-slate-700/50">
                        {tooltip}
                        <div className="absolute bottom-[-5px] left-1/2 transform -translate-x-1/2 w-2 h-2 bg-slate-800 rotate-45 border-r border-b border-slate-700/50"></div>
                    </div>
                )}
            </div>
        );

        // 組件：三柱對比圖表
        // 組件：三柱對比圖表
        const BarComparison = ({ title, data }) => {
            if (!window.Recharts) return <div className="text-gray-400 text-sm p-4 text-center">圖表庫載入中...</div>;
            const { ResponsiveContainer, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = window.Recharts;
            return (
                <div className="flex flex-col w-full">
                    <h4 className="text-center font-bold text-gray-700 mb-6 text-sm relative">
                        {title}
                    </h4>
                    
                    <div className="h-[320px] w-full relative">
                        
                        <ResponsiveContainer width="100%" height="100%">
                            <BarChart data={data} margin={{ top: 10, right: 10, left: 0, bottom: 20 }} barGap={8}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#475569', fontSize: 12, fontWeight: 500}} dy={15} interval={0} />
                                <YAxis axisLine={false} tickLine={false} tick={{fill: '#475569', fontSize: 11}} tickFormatter={(v) => formatNum(v)} />
                                <Tooltip 
                                    itemStyle={{ color: '#475569', fontWeight: 600 }} contentStyle={{ borderRadius: '8px' }} 
                                    cursor={{ fill: '#f1f5f9' }}
                                    formatter={(value, name) => [`${formatNum(value)} 百萬元`, name]}
                                />
                                <Legend 
                                    verticalAlign="top" 
                                    align="center" 
                                    wrapperStyle={{ paddingBottom: '25px', fontSize: '12px', color: '#64748b' }} 
                                    iconType="square" 
                                    iconSize={8} 
                                />
                                <Bar dataKey="113年同期" fill="#cbd5e1" radius={[4, 4, 0, 0]} maxBarSize={45} />
                                <Bar dataKey="實際" fill="#10b981" radius={[4, 4, 0, 0]} maxBarSize={45} />
                                <Bar dataKey="預算" fill="#3b82f6" radius={[4, 4, 0, 0]} maxBarSize={45} />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        };

        // 組件：五年營運趨勢圖表
        const TrendLineChart = ({ data }) => {
            if (!window.Recharts) return <div className="text-gray-400 text-sm p-4 text-center">圖表庫載入中...</div>;
            const { ResponsiveContainer, ComposedChart, Line, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, Label } = window.Recharts;
            const ChartCard = ({ title, lines, showBar = false }) => (
                <div className="w-full bg-white rounded-2xl p-6 border border-gray-100 shadow-sm relative">
                    <h4 className="text-center font-bold text-gray-700 mb-6 text-sm">{title}</h4>
                    <div className="h-[280px] w-full relative">
                        <ResponsiveContainer width="100%" height="100%">
                            <ComposedChart data={data} margin={{ top: showBar ? 60 : 40, right: 20, left: 10, bottom: 40 }}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                <XAxis dataKey="year" axisLine={false} tickLine={false} tick={{fill: '#475569', fontSize: 12, fontWeight: 500}} dy={15} interval={0} angle={-45} textAnchor="end" padding={{ left: 10, right: 20 }} height={60} />
                                <YAxis axisLine={false} tickLine={false} tick={{fill: '#475569', fontSize: 11}} tickFormatter={(v) => formatNum(v)} width={80} domain={['auto', 'auto']}  />
                                <Tooltip 
                                    itemStyle={{ color: '#475569', fontWeight: 600 }} contentStyle={{ borderRadius: '8px' }} 
                                    cursor={{stroke: '#e2e8f0', strokeWidth: 1, strokeDasharray: '3 3'}}
                                    formatter={(value, name) => {
                                        const displayName = typeof name === 'string' ? name.replace('_預估', ' (執行中)') : name;
                                        return [`${formatNum(value)} 百萬元`, displayName];
                                    }}
                                />
                                {(lines.length > 1 || showBar) && (
                                    <Legend 
                                        verticalAlign="top" 
                                        align="center" 
                                        wrapperStyle={{ top: showBar ? 0 : undefined, paddingBottom: '15px', fontSize: '12px', color: '#64748b' }} 
                                        iconType="circle" 
                                        iconSize={8}
                                        formatter={(value) => <span style={{ color: '#374151', fontWeight: 500 }}>{value}</span>}
                                        {...(showBar && {
                                            payload: [
                                                { value: '淨利差額', type: 'rect', color: '#94a3b8' },
                                                { value: '營業淨利', type: 'line', color: '#34d399' },
                                                { value: '稅後淨利', type: 'line', color: '#3b82f6' }
                                            ]
                                        })}
                                    />
                                )}
                                {showBar && (
                                    <Bar dataKey="差額" name="淨利差額" fill="#64748b" fillOpacity={0.2} barSize={20} radius={[4, 4, 0, 0]} />
                                )}
                                {lines.map((line) => (
                                    <React.Fragment key={line.dataKey}>
                                        <Line type="monotone" dataKey={line.dataKey} name={line.dataKey} stroke={line.color} strokeWidth={3} dot={{r: 4, strokeWidth: 2}} activeDot={{r: 6}} />
                                        <Line type="monotone" dataKey={`${line.dataKey}_預估`} name={`${line.dataKey}_預估`} stroke={line.color} strokeWidth={3} strokeDasharray="6 6" dot={{r: 4, strokeWidth: 2, fill: '#fff'}} activeDot={{r: 6}} legendType="none" />
                                    </React.Fragment>
                                ))}
                            </ComposedChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col w-full">
                    <h2 className="text-2xl font-bold flex items-center gap-3 mb-8 text-gray-800 border-l-4 border-[#2563eb] pl-4">
                        <i data-lucide="trending-up" className="w-6 h-6 text-blue-600"></i>
                        過去五年營運趨勢 (百萬元)
                    </h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <ChartCard title="營業收入趨勢（百萬元）" lines={[{ dataKey: "營業收入", color: "#3b82f6" }]} />
                        <ChartCard title="營業費用趨勢（百萬元）" lines={[{ dataKey: "營業費用", color: "#94a3b8" }]} />
                        <ChartCard title="淨利趨勢（百萬元）" showBar={true} lines={[
                            { dataKey: "營業淨利", color: "#34d399" }, // emerald-400
                            { dataKey: "稅後淨利", color: "#3b82f6" }  // blue-500
                        ]} />
                    </div>
                </div>
            );
        };

        // 營運現況儀表板 (Page 2)
        const OperationDashboard = () => {
            if (!window.Recharts) return <div className="text-gray-400 text-sm p-4 text-center">圖表庫載入中...</div>;
            const { ResponsiveContainer, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = window.Recharts;
            
            // 單位：元 (客單價)
            const ticketData = [
                { name: '本館', '實際': 6991, '預算': 7000, '113年同期': 6571 },
                { name: '巨蛋', '實際': 1594, '預算': 1650, '113年同期': 1644 }
            ];
            
            // 單位：千人 (來客數)
            const visitorData = [
                { name: '本館', '實際': 2799, '預算': 2601, '113年同期': 2976 },
                { name: '巨蛋', '實際': 13774, '預算': 13500, '113年同期': 13335 }
            ];

            const StatCard = ({ title, actual, budget, achRate, yoyRate, yoyValue, unit }) => {
                const achColor = achRate > 105 ? 'text-emerald-500' : achRate < 95 ? 'text-rose-500' : 'text-gray-500';
                const yoyColor = yoyRate > 5 ? 'text-emerald-500' : yoyRate < -5 ? 'text-rose-500' : 'text-gray-500';
                const achSign = achRate > 100 ? '+' : '';
                return (
                    <div className="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm hover:shadow-md transition-shadow duration-200 flex flex-col justify-between relative group cursor-pointer">
                        <div className="text-gray-500 text-sm font-semibold mb-2">{title}</div>
                        <div className="flex items-baseline gap-1 mb-4">
                            <span className="text-3xl font-black text-gray-800">{formatNum(actual)}</span>
                            <span className="text-sm text-gray-500">{unit}</span>
                        </div>
                        <div className="space-y-2 text-sm">
                            <div className="flex justify-between">
                                <span className="text-gray-500">預算達成</span>
                                <span className={`font-semibold ${achColor}`}>{achRate.toFixed(2)}%</span>
                            </div>
                            <div className="flex justify-between pt-1.5 border-t border-gray-50">
                                <span className="text-gray-500">同期成長</span>
                                <span className={`font-semibold ${yoyColor}`}>{yoyRate > 0 ? '+' : ''}{yoyRate.toFixed(2)}%</span>
                            </div>
                        </div>
                        {/* Hover Tooltip */}
                        <div className="absolute bottom-full right-0 mb-2 hidden group-hover:block bg-gray-800 text-white text-xs rounded py-1 px-2 z-10 whitespace-nowrap shadow-lg">
                            <div className="font-bold mb-0.5">預算目標：{formatNum(budget)} {unit}</div>
                            <div className="font-bold">去年同期：{formatNum(yoyValue)} {unit}</div>
                        </div>
                    </div>
                );
            };

            const OpChartCard = ({ title, data, unit, CustomTooltipFormatter }) => (
                <div className="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
                    <h4 className="text-center font-bold text-gray-700 mb-6 text-sm">{title}</h4>
                    <div className="h-[280px] w-full">
                        <ResponsiveContainer width="100%" height="100%">
                            <BarChart data={data} barGap={8} margin={{ top: 20, right: 30, left: 20, bottom: 5 }}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#475569', fontSize: 13, fontWeight: 500}} dy={10} interval={0} />
                                <YAxis axisLine={false} tickLine={false} tick={{fill: '#475569', fontSize: 11}} tickFormatter={(v) => formatNum(v)} width={50} />
                                <Tooltip 
                                    itemStyle={{ color: '#475569', fontWeight: 600 }} contentStyle={{ borderRadius: '8px' }}
                                    cursor={{ fill: '#f1f5f9' }}
                                    formatter={CustomTooltipFormatter}
                                    labelStyle={{ color: '#475569', fontWeight: 600, marginBottom: '8px' }}
                                />
                                <Legend 
                                    verticalAlign="top" 
                                    wrapperStyle={{ paddingBottom: '20px', fontSize: '12px', color: '#64748b' }} 
                                    iconType="circle" 
                                    iconSize={8}
                                    formatter={(value) => <span style={{ color: '#374151', fontWeight: 500 }}>{value}</span>}
                                />
                                <Bar dataKey="113年同期" fill="#cbd5e1" radius={[4, 4, 0, 0]} barSize={24} />
                                <Bar dataKey="實際" fill="#10b981" radius={[4, 4, 0, 0]} barSize={24} />
                                <Bar dataKey="預算" fill="#3b82f6" radius={[4, 4, 0, 0]} barSize={24} />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );

            return (
                <div className="animate-fade-in w-full">
                    {/* 標題與 checkbox 狀態 */}
                    <div className="mb-8">
                        <h2 className="text-2xl font-black text-gray-900 mb-4 tracking-tight">營運現況</h2>
                        <h3 className="text-lg font-bold text-gray-800 border-l-4 border-emerald-600 pl-3 mb-6">
                            營業面：[本館&巨蛋] 持續增加營收
                        </h3>
                    </div>

                    {/* 四格 KPI 數據卡 */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                        <StatCard title="本館客單價" actual={6991} budget={7000} achRate={99.87} yoyRate={6.33} yoyValue={6571} unit="元" />
                        <StatCard title="巨蛋客單價" actual={1594} budget={1650} achRate={96.61} yoyRate={-3.04} yoyValue={1644} unit="元" />
                        <StatCard title="本館來客數" actual={2799} budget={2601} achRate={107.61} yoyRate={-5.95} yoyValue={2976} unit="千人" />
                        <StatCard title="巨蛋來客數" actual={13774} budget={13500} achRate={102.03} yoyRate={3.29} yoyValue={13335} unit="千人" />
                    </div>

                    {/* 雙柱狀圖對比 */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
                        <OpChartCard title="客單價對比 (元)" data={ticketData} CustomTooltipFormatter={(value, name) => [`${formatNum(value)} 元`, name]} />
                        <OpChartCard title="來客數對比 (千人)" data={visitorData} CustomTooltipFormatter={(value, name) => [`${formatNum(value)} 千人`, name]} />
                    </div>

                    {/* 底部營運小結 */}
                    <div className="bg-gray-50 rounded-xl p-6 border border-gray-100 text-sm text-gray-600 leading-relaxed shadow-sm">
                        <h4 className="font-bold text-gray-800 mb-2">營運分析備註：</h4>
                        <ul className="list-disc pl-5 space-y-1">
                            <li>巨蛋客單價減少主係113年超市改裝，帶動低單價高頻次消費人潮，稀釋整體平均客單價。</li>
                            <li>同期預算比較中，巨蛋已排除台中數據以維持基礎比較基準一致性。</li>
                        </ul>
                    </div>
                </div>
            );
        };

        // 獲利面儀表板 (Page 3)
        const FinalExpenseDashboard = () => {

            if (!window.Recharts) return <div className="text-gray-400 text-sm p-4 text-center">圖表庫載入中...</div>;
            const { ResponsiveContainer, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = window.Recharts;

            // 獨立組件：營運分析備註 (避免圖表閃爍)
            const ExpenseNotes = () => {
                const [activeNoteTab, setActiveNoteTab] = React.useState('budget');
                return (
                    <div className="bg-[#f1f5f9] rounded-2xl p-6 lg:p-8 mb-10 border border-gray-200 shadow-sm relative">
                        <div className="flex items-center gap-2 mb-6">
                            <i data-lucide="edit" className="w-5 h-5 text-gray-600"></i>
                            <h3 className="font-bold text-gray-800 text-lg">營運分析備註</h3>
                        </div>
                        <div className="flex gap-2 mb-6 border-b border-gray-200 pb-4">
                            <button onClick={() => setActiveNoteTab('budget')} className={`px-6 py-2 rounded-full text-sm font-semibold transition-colors shadow-sm ${activeNoteTab === 'budget' ? 'bg-[#2e7d32] text-white' : 'bg-gray-200/80 text-gray-600 hover:bg-gray-300'}`}>與預算比</button>
